services:
  web:
    build: .
    labels:
      - "luffy.entrypoint=true"
      - "luffy.port=3000"
    environment:
      NODE_ENV: "production"
      DATABASE_HOST: "db"
      DATABASE_PORT: "3306"
      DATABASE_NAME: "${DATABASE_NAME:-gundam_wiki}"
      DATABASE_USER: "${DATABASE_USER:-gundam}"
      DATABASE_PASSWORD: "${MYSQL_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy

  db:
    build: ./database
    environment:
      MYSQL_DATABASE: "${DATABASE_NAME:-gundam_wiki}"
      MYSQL_USER: "${DATABASE_USER:-gundam}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mysql-data:
    name: ${slug}-data
