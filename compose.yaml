services:
  web:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:-}"
        VITE_SUPABASE_PUBLISHABLE_KEY: "${VITE_SUPABASE_PUBLISHABLE_KEY:-}"
    labels:
      - "luffy.entrypoint=true"
      - "luffy.port=3000"
    environment:
      NODE_ENV: "production"
